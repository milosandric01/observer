<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1200px; height:630px; overflow:hidden; }
.card {
  width:1200px; height:630px;
  background:#08090a;
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  position:relative; padding:60px;
}
.glow {
  position:absolute; top:-80px; left:50%; transform:translateX(-50%);
  width:800px; height:500px;
  background:radial-gradient(ellipse at center, rgba(94,106,210,0.25), transparent 65%);
  pointer-events:none;
}
.grid {
  position:absolute; inset:0;
  background-image:linear-gradient(rgba(255,255,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.025) 1px,transparent 1px);
  background-size:58px 58px;
  mask-image:radial-gradient(ellipse 70% 60% at 50% 40%, #000 30%, transparent 75%);
}
.logo {
  display:flex; align-items:center; gap:14px; margin-bottom:40px;
}
.logo-ring {
  width:40px; height:40px; border-radius:50%; border:3px solid #5e6ad2;
  display:flex; align-items:center; justify-content:center;
}
.logo-dot { width:12px; height:12px; border-radius:50%; background:#8b93e8; box-shadow:0 0 12px rgba(139,147,232,0.9); }
.logo-text { font-size:28px; font-weight:600; color:#f7f8f8; letter-spacing:-0.01em; }
h1 {
  font-size:52px; line-height:1.1; font-weight:600; letter-spacing:-0.03em;
  color:#f7f8f8; text-align:center; max-width:900px; text-wrap:balance;
}
.sub {
  font-size:22px; color:#8a8f98; margin-top:20px; text-align:center; max-width:650px;
}
.url {
  position:absolute; bottom:40px; font-size:18px; color:#62666d; letter-spacing:0.02em;
}
</style>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="card">
  <div class="glow"></div>
  <div class="grid"></div>
  <div class="logo" style="position:relative;">
    <div class="logo-ring"><div class="logo-dot"></div></div>
    <span class="logo-text">Observer</span>
  </div>
  <h1 style="position:relative;">Understand why visitors leave without becoming customers.</h1>
  <p class="sub" style="position:relative;">One script captures every click, scroll, and error — so you can fix what's broken.</p>
  <span class="url">observer.io</span>
</div>
</body>
</html>
